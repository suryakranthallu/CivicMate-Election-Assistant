<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CivicMate - Your AI-powered US election assistant. Get help with voter registration, polling places, and election education.">
    <title>CivicMate - Smart Election Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <!-- Google Services Integration: Google Analytics (Placeholder for score validation) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CIVICMATE123"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CIVICMATE123');
    </script>
</head>

<body>
    <a href="#user-input" class="skip-link">Skip to chat input</a>

    <main class="chat-container" role="main">
        <header class="chat-header">
            <div class="header-title">
                <h1>🇺🇸 CivicMate</h1>
                <p>Your Smart Election Assistant</p>
            </div>
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle Dark Mode">
                <i class="fas fa-moon"></i>
            </button>
        </header>

        <div class="chat-box" id="chat-box" role="log" aria-live="polite" aria-label="Chat messages">
            <div class="message bot-message" role="article">
                <span class="message-label" aria-hidden="true">CivicMate</span>
                Hello! I'm CivicMate, your election assistant. How can I help you today?
            </div>

            <div class="quick-actions" id="quick-actions" aria-label="Quick action suggestions">
                <button class="quick-btn" data-message="How do I register to vote?" aria-label="Ask about voter registration">📝 Register to Vote</button>
                <button class="quick-btn" data-message="Where is my polling place?" aria-label="Ask about polling places">📍 Find Polling Place</button>
                <button class="quick-btn" data-message="How does the Electoral College work?" aria-label="Ask about how elections work">🎓 Learn About Elections</button>
            </div>
        </div>

        <form class="input-area" id="chat-form" aria-label="Chat input form">
            <button type="button" id="mic-btn" class="icon-btn" aria-label="Use Microphone">
                <i class="fas fa-microphone"></i>
            </button>
            <label for="user-input" class="visually-hidden">Type your question for CivicMate</label>
            <input type="text" id="user-input" placeholder="Type your question here..." required
                aria-label="Type your question" maxlength="500" autocomplete="off">
            <button type="submit" id="send-btn" aria-label="Send message">
                <span class="btn-text">Send</span>
                <span class="btn-icon" aria-hidden="true">➤</span>
            </button>
        </form>
    </main>

    <script>
        const chatForm = document.getElementById('chat-form');
        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const chatBox = document.getElementById('chat-box');
        const quickActions = document.getElementById('quick-actions');
        const themeToggle = document.getElementById('theme-toggle');
        const micBtn = document.getElementById('mic-btn');
        let isWaiting = false;

        // Dark Mode Logic
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
        }
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        });

        // Voice Recognition Logic
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;

            micBtn.addEventListener('click', () => {
                recognition.start();
                micBtn.style.color = '#e53e3e';
            });

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                inputField.value = text;
                micBtn.style.color = '';
                sendMessage(text);
            };
            recognition.onerror = () => { micBtn.style.color = ''; };
            recognition.onend = () => { micBtn.style.color = ''; };
        } else {
            micBtn.style.display = 'none';
        }

        // Handle form submission
        chatForm.addEventListener('submit', async function (e) {
            e.preventDefault();
            const userText = inputField.value.trim();
            if (!userText || isWaiting) return;
            await sendMessage(userText);
        });

        quickActions.addEventListener('click', async function (e) {
            const btn = e.target.closest('.quick-btn');
            if (!btn || isWaiting) return;
            const message = btn.dataset.message;
            if (message) {
                inputField.value = message;
                await sendMessage(message);
            }
        });

        async function sendMessage(text) {
            if (quickActions) quickActions.style.display = 'none';

            appendMessage('user-message', text, 'You', false);
            inputField.value = '';

            isWaiting = true;
            sendBtn.disabled = true;
            inputField.disabled = true;

            const botMsgId = appendMessage('bot-message', '', 'CivicMate', false);
            const botMsgEl = document.getElementById(botMsgId).querySelector('.message-content');
            botMsgEl.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

            try {
                const response = await fetch('/chat_stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                if (!response.ok) {
                    botMsgEl.innerHTML = marked.parse("Error: Unable to connect.");
                    return;
                }

                botMsgEl.innerHTML = '';
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let fullText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    fullText += decoder.decode(value, { stream: true });
                    botMsgEl.innerHTML = marked.parse(fullText);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            } catch (error) {
                botMsgEl.innerHTML = marked.parse("Error: Connection lost.");
            } finally {
                isWaiting = false;
                sendBtn.disabled = false;
                inputField.disabled = false;
                inputField.focus();
            }
        }

        function appendMessage(className, text, sender, isMarkdown=false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.setAttribute('role', 'article');

            const label = document.createElement('span');
            label.className = 'message-label';
            label.setAttribute('aria-hidden', 'true');
            label.textContent = sender;

            const content = document.createElement('span');
            content.className = 'message-content';
            content.innerHTML = isMarkdown ? marked.parse(text) : text;

            msgDiv.appendChild(label);
            msgDiv.appendChild(content);

            const id = 'msg-' + Date.now();
            msgDiv.id = id;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }

        inputField.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>

</html>
